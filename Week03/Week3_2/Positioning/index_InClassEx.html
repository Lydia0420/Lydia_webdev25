<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Positioning</title>
    <style type="text/css">
      .abs_br {
        width: 200px;
        height: 200px;
        background-color: blueviolet;
        position: absolute;
        bottom: 0;
        right: 20px;
      }

      .rel_tl {
        width: 200px;
        height: 200px;
        background-color: rgb(54, 114, 183);
        position: relative;
        bottom: 50%;
        right: 50%;
      }

      .abs_child {
        width: 100px;
        height: 100px;
        background-color: rgb(183, 137, 226);
        position: absolute;
        top: 45px;
        left: 40px;
      }

      .rel_parent {
        width: 400px;
        height: 400px;
        background-color: rgb(44, 147, 110);
        position: relative;
      }

      .abs_parent {
        width: 600px;
        height: 600px;
        background-color: darkblue;
        position: absolute;
        bottom: 100px;
        right: 200px;
      }

      .fixed_top {
        width: 100%;
        height: 100px;
        background-color: yellow;
        position: fixed;
        top: 0;
      }

      .cover {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: rgba(0, 0, 0, 0.3);
      }
    
    </style>
  </head>
  <body>
    <!-- 绝对定位元素如果没有绝对定位父元素will position 他们自己 based on the browser window.-->
    <div class="abs_br"></div>

    <!-- 相对定位元素如果没有绝对定位父元素will position 他们自己 relative to where they were supposed to be -->>
    <div class="rel_tl"></div>

    <!-- 定位父元素-->
    <div class="rel_parent">
      <div class="abs_child"></div>
    </div>

    <div class="abs_parent">
       . ./.''/.
      <div class="abs_child"></div>
    </div>

    <div class="fixed_top"></div>

    <div class="cover"></div>
  </body>
</html>
